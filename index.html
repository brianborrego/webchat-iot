<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebChat IoT</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="bg-canvas"></div>

  <div class="chat-wrapper">
    <div class="chat-container">
      <div class="chat-header">
        <span class="header-title">&gt; WEBCHAT_IOT</span>
        <button id="clear-btn" class="clear-btn">[CLEAR]</button>
      </div>

      <div class="chat-messages" id="messages"></div>

      <div class="typing-indicator" id="typing-indicator"></div>

      <div class="chat-input-area">
        <div class="input-row">
          <span class="prompt-symbol">&gt;</span>
          <input type="text" id="username" class="terminal-input username-input" placeholder="HANDLE" maxlength="20">
          <input type="text" id="message" class="terminal-input message-input" placeholder="TYPE MESSAGE...">
          <button id="send-btn" class="send-btn">[SEND]</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ogl/dist/ogl.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/toxicity"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="background.js"></script>
  <script src="chat.js"></script>
</body>
</html>
